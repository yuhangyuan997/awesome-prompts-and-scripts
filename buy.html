<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购买 - 数字产品小铺</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:#08090a;color:#d0d6e0;min-height:100vh;padding:24px;}
.container{max-width:600px;margin:0 auto;padding-top:40px;}
.card{background:#0f1011;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;margin-bottom:20px;text-align:center;}
h1{font-size:28px;font-weight:600;color:#f7f8f8;letter-spacing:-0.5px;margin-bottom:6px;}
.sub{color:#8a8f98;font-size:14px;margin-bottom:24px;}
.prod-icon{font-size:48px;margin-bottom:8px;}
.prod-name{font-size:24px;font-weight:600;color:#f7f8f8;margin-bottom:4px;}
.prod-price{font-size:32px;font-weight:700;color:#f7f8f8;margin-bottom:4px;}
.prod-desc{font-size:13px;color:#8a8f98;margin-bottom:20px;}
.qr-row{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin:24px 0;}
.qr-box{text-align:center;}
.qr-box img{width:150px;height:150px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);}
.qr-box p{font-size:12px;color:#8a8f98;margin-top:6px;}
.switch-area{margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.05);}
.switch-area p{font-size:13px;color:#62666d;margin-bottom:10px;}
.switch-btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#d0d6e0;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;margin:3px;transition:all 0.2s;}
.switch-btn:hover{border-color:#6c5ce7;}
.switch-btn.active{background:rgba(108,92,231,0.1);border-color:#6c5ce7;}
.dl-area{margin-top:24px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.05);}
.dl-area h3{font-size:18px;color:#f7f8f8;margin-bottom:12px;}
.dl-area p{font-size:13px;color:#8a8f98;margin-bottom:16px;}
.code-row{display:flex;gap:8px;max-width:400px;margin:0 auto;}
.code-row input{flex:1;padding:12px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#f7f8f8;font-size:14px;font-family:'Inter',sans-serif;outline:none;text-align:center;}
.code-row input:focus{border-color:#6c5ce7;}
.code-row button{background:#6c5ce7;color:white;border:none;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;}
.code-row button:hover{background:#7c6cf0;}
.result{display:none;margin-top:16px;padding:20px;border-radius:10px;}
.result.show{display:block;animation:fadeUp 0.3s ease;}
.result.success{border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.05);}
.result.success h3{color:#10b981;font-size:18px;margin-bottom:12px;}
.result.error{border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.05);}
.result.error h3{color:#ef4444;font-size:18px;margin-bottom:6px;}
.dl-btn{display:inline-block;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:#f7f8f8;padding:12px 24px;border-radius:8px;text-decoration:none;font-size:14px;margin:6px;transition:all 0.2s;}
.dl-btn:hover{background:rgba(255,255,255,0.1);border-color:#6c5ce7;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.back{display:block;text-align:center;margin-top:20px;color:#828fff;text-decoration:none;font-size:13px;}
</style>
</head>
<body>
<div class="container">
<h1>购买商品</h1>
<p class="sub">选商品 → 扫码付款 → 输入单号 → 自动下载</p>
<div class="card">
<div id="productShow">
<div class="prod-icon" id="prodIcon">⏳</div>
<div class="prod-name" id="prodName">加载中...</div>
<div class="prod-price" id="prodPrice"></div>
<div class="prod-desc" id="prodDesc"></div>
</div>
<div id="payArea">
<div style="background:rgba(108,92,231,0.08);border-radius:8px;padding:12px;margin-bottom:20px;border:1px solid rgba(108,92,231,0.15);"><span style="font-size:20px;font-weight:700;color:#f7f8f8;" id="priceTag"></span></div>
<div class="qr-row">
<div class="qr-box"><img src="assets/wechat-qr.png" alt="微信"><p>微信支付</p></div>
<div class="qr-box"><img src="assets/alipay-qr.jpg" alt="支付宝"><p>支付宝支付</p></div>
</div>
<p style="font-size:12px;color:#62666d;margin-bottom:4px;">扫码付款后，在微信/支付宝「账单」中找到「交易单号」</p>
<div class="dl-area">
<h3>输入交易单号领取文件</h3>
<p>复制账单详情页的「交易单号」，粘贴到下方即可自动验证</p>
<div class="code-row">
<input type="text" id="txId" placeholder="粘贴交易单号" maxlength="64">
<button onclick="claimDownload()">领取文件</button>
</div>
<div id="claimResult" class="result"></div>
</div>
</div>
<div class="switch-area">
<p>想换其他商品？</p>
<div>
<button class="switch-btn" id="btn-ai" onclick="selectProduct('ai')">🤖 AI提示词 ¥1.3</button>
<button class="switch-btn" id="btn-py" onclick="selectProduct('py')">🐍 Python脚本 ¥1.0</button>
<button class="switch-btn" id="btn-bundle" onclick="selectProduct('bundle')">🎯 组合包 ¥2.0</button>
</div>
</div>
</div>
<a href="index.html" class="back">← 返回首页</a>
</div>
<script>
var pdata = {
    ai: {icon: "🤖", name: "AI提示词宝典", price: "¥1.3", desc: "170条即用Prompt · 覆盖10大场景"},
    py: {icon: "🐍", name: "Python办公自动化脚本", price: "¥1.0", desc: "12个实用脚本 · 一键搞定重复工作"},
    bundle: {icon: "🎯", name: "超值组合包", price: "¥2.0", desc: "AI提示词 + Python脚本合集 · 省¥1.6"}
};
var params = new URLSearchParams(window.location.search);
var cur = params.get('product') || 'ai';
if (!pdata[cur]) cur = 'ai';
function showProduct(id) {
    var p = pdata[id]; if (!p) return;
    cur = id;
    document.getElementById('prodIcon').textContent = p.icon;
    document.getElementById('prodName').textContent = p.name;
    document.getElementById('prodPrice').innerHTML = p.price;
    document.getElementById('prodDesc').textContent = p.desc;
    document.getElementById('priceTag').innerHTML = p.price + ' <span style="font-size:14px;color:#8a8f98;font-weight:400;">' + p.name + '</span>';
    var btns = document.querySelectorAll('.switch-btn');
    for (var i = 0; i < btns.length; i++) btns[i].className = 'switch-btn';
    var ab = document.getElementById('btn-' + id);
    if (ab) ab.className = 'switch-btn active';
}
function selectProduct(id) { showProduct(id); document.getElementById('txId').value = ''; document.getElementById('claimResult').className = 'result'; }
async function claimDownload() {
    var tx = document.getElementById('txId').value.trim();
    var r = document.getElementById('claimResult');
    if (!tx || tx.length < 8) {
        r.className = 'result error show';
        r.innerHTML = '<h3>❌ 请输入有效的交易单号</h3><p style="color:#8a8f98;font-size:13px;">交易单号在微信/支付宝账单详情页，一般以数字或字母开头，长度8-64位</p>';
        return;
    }
    r.className = 'result success show';
    var seed = tx + '-ds-store-' + cur;
    var enc = new TextEncoder();
    var hash = await crypto.subtle.digest('SHA-256', enc.encode(seed));
    var arr = Array.from(new Uint8Array(hash)).slice(0,4);
    var code = '';
    for (var i = 0; i < arr.length; i++) code += arr[i].toString(16).padStart(2,'0');
    code = code.toUpperCase();
    var dc = cur === 'ai' ? 'AI-' + code : cur === 'py' ? 'PY-' + code : 'PK-' + code;
    var files = cur === 'ai' ? '<a class="dl-btn" href="awesome-ai-prompts.md" download>📄 下载 AI提示词宝典</a>' : cur === 'py' ? '<a class="dl-btn" href="python-scripts/" target="_blank">📁 查看 Python脚本合集</a>' : '<a class="dl-btn" href="awesome-ai-prompts.md" download>📄 AI提示词</a><a class="dl-btn" href="python-scripts/" target="_blank">📁 Python脚本</a>';
    r.innerHTML = '<h3>✅ 验证通过！下载码：<span style="background:rgba(108,92,231,0.15);padding:4px 12px;border-radius:6px;letter-spacing:2px;font-size:16px;">' + dc + '</span></h3><p style="color:#8a8f98;font-size:13px;margin:12px 0;">' + pdata[cur].name + ' ' + pdata[cur].price + '</p><div style="margin-top:16px;">' + files + '</div><p style="color:#62666d;font-size:11px;margin-top:12px;">感谢购买 😊</p>';
}
showProduct(cur);
</script>
</body>
</html>
